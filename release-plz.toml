[workspace]
git_release_enable = false
git_tag_name = "{{ package }}-v{{ version }}"

# Internal crates: published to crates.io (required by public crates)
# but no GitHub releases or changelogs
[[package]]
name = "sonos-sdk-soap-client"
changelog_update = false
git_release_enable = false

[[package]]
name = "sonos-sdk-callback-server"
changelog_update = false
git_release_enable = false

[[package]]
name = "sonos-sdk-discovery"
changelog_update = false
git_release_enable = false

[[package]]
name = "sonos-sdk-stream"
changelog_update = false
git_release_enable = false

[[package]]
name = "sonos-sdk-event-manager"
changelog_update = false
git_release_enable = false

[[package]]
name = "sonos-sdk-state"
changelog_update = false
git_release_enable = false

[[package]]
name = "sonos-sdk-state-store"
changelog_update = false
git_release_enable = false

# Public crates: full release pipeline
[[package]]
name = "sonos-api"
git_release_enable = true
semver_check = true

[[package]]
name = "sonos-sdk"
git_release_enable = true
semver_check = true
changelog_include = [
  "sonos-api",
  "sonos-sdk-state",
  "sonos-sdk-discovery",
  "sonos-sdk-stream",
  "sonos-sdk-event-manager",
  "sonos-sdk-callback-server",
  "sonos-sdk-soap-client",
  "sonos-sdk-state-store",
]
